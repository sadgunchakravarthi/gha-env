name: Deployment

on:
  push:
    branches:
      - main
      - dev

env:
  MONGODB_DB_NAME: gha-demo

jobs:
  test:
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Get Code
        uses: actions/checkout@v3

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-deps-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      # 🔴 Fail early if secrets are missing
      - name: Validate MongoDB secrets
        run: |
          if [ -z "${{ secrets.MONGODB_USERNAME }}" ] || [ -z "${{ secrets.MONGODB_PASSWORD }}" ]; then
            echo "❌ Missing MongoDB credentials"
            exit 1
          fi

      - name: Run server
        env:
          MONGODB_CLUSTER_ADDRESS: cluster0.bzacnaf.mongodb.net
          MONGODB_USERNAME: ${{ secrets.MONGODB_USERNAME }}
          MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
          MONGODB_DB_NAME: gha-demo
          PORT: 8080
        run: |
          echo "USERNAME=$MONGODB_USERNAME"
          npm start &
          npx wait-on http://127.0.0.1:$PORT

      - name: Run tests
        env:
          MONGODB_CLUSTER_ADDRESS: cluster0.bzacnaf.mongodb.net
          MONGODB_USERNAME: ${{ secrets.MONGODB_USERNAME }}
          MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
          MONGODB_DB_NAME: gha-demo
          PORT: 8080
        run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Output information
        env:
          MONGODB_USERNAME: ${{ secrets.MONGODB_USERNAME }}
        run: |
          echo "MONGODB_USERNAME=$MONGODB_USERNAME"
          echo "MONGODB_DB_NAME=gha-demo"